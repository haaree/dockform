databases:
  - name: dockform-db
    plan: free
    databaseName: dockform
    user: dockform

services:
  - type: web
    name: dockform-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: ./server
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: dockform-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000

  - type: web
    name: dockform-web
    runtime: static
    buildCommand: cd app && npm install && npm run build
    staticPublishPath: app/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
