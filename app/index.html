<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a3f8f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DockForm" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="description" content="No-Code Forms & Checklists. Built for Industry." />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>DockForm — No-Code Forms & Checklists</title>
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; }
      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; -webkit-font-smoothing: antialiased; }
      @supports (padding-top: env(safe-area-inset-top)) {
        body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); padding-left: env(safe-area-inset-left); padding-right: env(safe-area-inset-right); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            // The browser only re-fetches sw.js on its own schedule (hours, sometimes not
            // until next full navigation) -- an installed PWA tab can otherwise sit on a
            // stale bundle indefinitely since nothing else prompts a check. Poll explicitly
            // so a deploy is detected within minutes of the tab being open, not "eventually".
            setInterval(() => reg.update().catch(() => {}), 5 * 60 * 1000);
          });
        });
      }
    </script>
  </body>
</html>
