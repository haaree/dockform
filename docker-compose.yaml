services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dockform
      POSTGRES_USER: dockform
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dockform_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dockform"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dockform:${DB_PASSWORD:-dockform_secret}@db:5432/dockform
      JWT_SECRET: ${JWT_SECRET:-dockform-factory-jwt-secret-change-me}
      PORT: "3000"

  web:
    build: ./app
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  pgdata:
