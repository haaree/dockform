services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dockform
      POSTGRES_USER: dockform
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dockform_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dockform"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dockform:${DB_PASSWORD:-dockform_secret}@db:5432/dockform
      JWT_SECRET: ${JWT_SECRET:-dockform-factory-jwt-secret-change-me}
      PORT: "3000"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-dockform-photos}

  web:
    build: ./app
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  pgdata:
